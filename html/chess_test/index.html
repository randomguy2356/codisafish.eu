<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cod is a fish — elo calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="wrapper">

    <header>
      <div class="header-tag">tools</div>
      <h1 class="site-title">elo calculator</h1>
    </header>

    <div class="divider"></div>

    <div class="section-label">calculate</div>

    <div class="panel">
      <div class="input">
        <input type="text" id="a_elo" placeholder="player a elo">
        <input type="text" id="b_elo" placeholder="player b elo">
      </div>

      <div class="percentage">
        <p id="expected_score"></p>
      </div>

      <div class="grid">
        <div class="cell">
          <button type="submit" id="a_won">Player A won</button>
          <p class="label" id="a_won_delta"></p>
        </div>
        <div class="cell">
          <button type="submit" id="draw">draw</button>
          <p class="label" id="draw_delta"></p>
        </div>
        <div class="cell">
          <button type="submit" id="b_won">Player B won</button>
          <p class="label" id="b_won_delta"></p>
        </div>
      </div>
    </div>

    <div class="history-label">history</div>

    <div class="database">
      <ul id="transactions" class="transactions">
      </ul>
    </div>

    <p id="error_msg" class="error"></p>

    <footer>
      <a href="/">← back to projects</a>
      <div class="footer-dot"></div>
      <span>cod is a fish</span>
    </footer>

  </div>
  <script src="./app.js" defer></script>
</body>
</html>
