<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cod is a fish</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="wrapper">

    <header>
      <div>
        <div class="header-tag">welcome</div>
        <h1 class="site-title">my projects</h1>
      </div>
      <div class="account">
        <div class="user_info">
          <div id="username">codisafish</div>
        </div>
        <div class="buttons">
          <div class="login" id="login">
            <a class="login_btn" href="/login">login</a>
          </div>
          <div class="logout" id="logout">
            <a class="logout_btn" href="/api/auth/logout">logout</a>
          </div>
          <div class="register" id="register">
            <a class="register_btn" href="/register">register</a>
          </div>
        </div>
      </div>
    </header>

    <div class="divider"></div>

    <div class="section-label">all projects</div>

    <div class="grid" id="projectGrid">
      <a href="/chess" class="card">
        <div class="card-icon">♟️</div>
        <div class="card-name">Chess</div>
        <div class="card-desc">Chess is a two player game played on an 8x8 grid</div>
      </a>

      <div class="card card-placeholder">
        maybe i'll make more...
      </div>
    </div>
    <footer>
      <span>made by me :)</span>
      <div class="footer-dot"></div>
      <span id="year"></span>
    </footer>
  </div>
  <script src="./script.js"></script>
</body>
</html>
