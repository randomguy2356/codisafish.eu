<!DOCTYPE html>

<html lang=en>
<head>
	<meta charset="UTF-8">
	<title>Cod is a fish</title>
	<meta name="viewport" content="width=device_width, initial-scale=1" />
	<link rel="stylesheet" href="./style.css">
</head>

<body>
	<div class="top-bar">
		<div class="account">
			<p id="account_name"></p>
		</div>
		<div class="login">
			<a href="/login" id="login"></a>
		</div>
		<div class="logout">
			<a href="/api/auth/logout" id="logout"></a>
		</div>
		<div class="register">
			<a href="/register" id="register"></a>
		</div>
	</div>
  <div class="panel">
		<div class="input">
			<input id="a_elo" placeholder="player a elo">
			<input id="b_elo" placeholder="player b elo">
		</div>
		<div class="grid">
			<div class="cell">
				<button id="a_won">Player A won</button>
				<p class="label" id="a_won_delta"></p>
			</div>
			<div class="cell">
				<button id="draw">draw</button>
				<p class="label" id="draw_delta"></p>
			</div>
			<div class="cell">
				<button id="b_won">Player B won</button>
				<p class="label" id="b_won_delta"></p>
			</div>
		</div>
		<div class="percentage">
			<p id="expected_score"></p>
		</div>
	</div>
	
	<div class="database">
		<ul id="transactions" class="transactions">
		</ul>
	</div>
	


	<p id="error_msg" class="error"></p>

	<script src="./app.js" defer></script>

</body>
</html>
